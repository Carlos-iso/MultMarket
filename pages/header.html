<div class="header">
	<section class="logo-icon">
		<img src="../src/assets/icon/logo-icon.svg" alt="Logo da empresa" />
	</section>
	<section>
		<form class="form-container">
			<a href="https://github.com/gabrielalves12y-art" class="profile-icon">
				<img
					src="../src/assets/icon/profile-icon.svg"
					alt="Perfil do Usuário"
				/>
			</a>
			<button onclick="openCart()" class="cart-icon">
				<img src="../src/assets/icon/cart-icon.svg" alt="Carrinho de compras" />
			</button>
		</form>
		<form class="search-container" id="search-form" action="#" method="get">
			<input
				type="text"
				id="search-input"
				placeholder="Buscar"
				name="q"
				required
			/>
			<button type="submit"><i class="fas fa-search"></i></button>
		</form>
	</section>
</div>
